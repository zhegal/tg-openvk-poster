services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: openvk_sync
      POSTGRES_USER: openvk_sync
      POSTGRES_PASSWORD: openvk_sync
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openvk_sync -d openvk_sync"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
